<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="AI-powered daily order assistant for Hotel Aditya Grand, Kandukur — reduce wastage, optimize stock.">
  <meta name="theme-color" content="#0F1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Aditya Grand · AI Order Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash" class="splash">
    <div class="splash-inner">
      <div class="splash-logo">🏨</div>
      <div class="splash-name">Aditya Grand</div>
      <div class="splash-tagline">AI Kitchen Order Assistant</div>
      <div class="splash-loader"><div class="loader-bar"></div></div>
      <div class="splash-version">Powered by AI · Hotel Aditya Grand, Kandukur</div>
    </div>
  </div>

  <!-- Top Header -->
  <header class="app-header" id="app-header">
    <div class="header-left">
      <div class="hotel-badge">🏨</div>
      <div>
        <div class="hotel-name">Aditya Grand</div>
        <div class="hotel-sub" id="greeting-text">Good morning</div>
      </div>
    </div>
    <div class="header-right">
      <div class="api-dot" id="api-dot" title="API Status"></div>
      <div class="date-badge" id="today-date"></div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="app-main" id="app-main"></main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" data-screen="dashboard" id="nav-dashboard">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Dashboard</span>
    </button>
    <button class="nav-btn" data-screen="recommendations" id="nav-recommendations">
      <span class="nav-icon">🧠</span>
      <span class="nav-label">Orders</span>
    </button>
    <button class="nav-btn" data-screen="log-sales" id="nav-log-sales">
      <span class="nav-icon">✏️</span>
      <span class="nav-label">Log Sales</span>
    </button>
    <button class="nav-btn" data-screen="trends" id="nav-trends">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Trends</span>
    </button>
  </nav>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/recommendations.js"></script>
  <script src="js/log-sales.js"></script>
  <script src="js/trends.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
